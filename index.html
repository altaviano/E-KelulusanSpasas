</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md">

<nav class="bg-surface border-b border-outline-variant shadow-sm w-full top-0 z-50">
<div class="flex justify-between items-center w-full px-3 md:px-stack-lg max-w-container-max mx-auto h-16">
<div class="flex items-center gap-2">
<span id="logoNav" class="text-2xl">🏫</span>
<span class="text-base md:text-headline-md font-bold text-primary">E-Kelulusan SMPN 1 Sukosari</span>
</div>
<div class="flex gap-3 items-center">
<a id="navPanduan" class="text-on-surface-variant text-xs md:font-label-md hover:text-primary transition-colors" href="#">📖 Panduan</a>
<a id="navKontak" class="text-on-surface-variant text-xs md:font-label-md hover:text-primary transition-colors" href="#">💬 Kontak</a>
</div>
</div>
</nav>

<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-stack-lg relative overflow-hidden bg-primary-container text-on-primary">
<div class="absolute inset-0 opacity-10 pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-secondary rounded-full mix-blend-screen filter blur-3xl"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-primary rounded-full mix-blend-screen filter blur-3xl"></div>
</div>
<div class="z-10 w-full max-w-4xl mx-auto flex flex-col items-center text-center space-y-4 md:space-y-stack-lg">

<div class="space-y-2 md:space-y-stack-md flex flex-col items-center">
<div class="w-24 h-24 md:w-40 md:h-40 rounded-full bg-surface-container-lowest shadow-lg p-1.5 flex items-center justify-center relative overflow-hidden border-4 border-secondary-container">
<img id="logoMain" class="w-full h-full object-cover rounded-full hidden" src="" alt="Logo"/>
<span id="logoFallback" class="text-5xl md:text-7xl">🏫</span>
</div>
<h1 class="text-xl md:font-headline-xl font-bold text-on-primary">Pengumuman Kelulusan</h1>
<p id="tahunAjaranDisplay" class="text-sm md:font-headline-md md:text-headline-md text-secondary-container">SMP Negeri 1 Sukosari Tahun Pelajaran 2025/2026</p>
</div>

<div class="bg-surface/10 backdrop-blur-md border border-surface/20 p-3 md:p-stack-lg rounded-xl shadow-2xl w-full max-w-sm md:max-w-3xl">
<div class="grid grid-cols-4 gap-1.5 md:gap-4">
<div class="flex flex-col items-center justify-center bg-surface-container-lowest/10 p-2 md:p-stack-md rounded-lg border border-surface-container-lowest/20">
<span class="text-xl md:text-5xl font-bold text-secondary-container tabular-nums" id="days">00</span>
<span class="text-[9px] md:text-sm text-on-primary mt-0.5 uppercase tracking-wider">Hari</span>
</div>
<div class="flex flex-col items-center justify-center bg-surface-container-lowest/10 p-2 md:p-stack-md rounded-lg border border-surface-container-lowest/20">
<span class="text-xl md:text-5xl font-bold text-secondary-container tabular-nums" id="hours">00</span>
<span class="text-[9px] md:text-sm text-on-primary mt-0.5 uppercase tracking-wider">Jam</span>
</div>
<div class="flex flex-col items-center justify-center bg-surface-container-lowest/10 p-2 md:p-stack-md rounded-lg border border-surface-container-lowest/20">
<span class="text-xl md:text-5xl font-bold text-secondary-container tabular-nums" id="minutes">00</span>
<span class="text-[9px] md:text-sm text-on-primary mt-0.5 uppercase tracking-wider">Menit</span>
</div>
<div class="flex flex-col items-center justify-center bg-surface-container-lowest/10 p-2 md:p-stack-md rounded-lg border border-surface-container-lowest/20">
<span class="text-xl md:text-5xl font-bold text-secondary-container tabular-nums" id="seconds">00</span>
<span class="text-[9px] md:text-sm text-on-primary mt-0.5 uppercase tracking-wider">Detik</span>
</div>
</div>
</div>

<div class="pt-2 md:pt-stack-md w-full max-w-md">
<button id="btnLocked" class="w-full bg-surface-variant text-on-surface-variant text-sm md:font-label-md py-3 md:py-4 px-4 rounded-lg opacity-70 cursor-not-allowed flex items-center justify-center gap-2 shadow-inner border border-outline-variant" disabled>
<span class="material-symbols-outlined text-base">lock</span> Login Dibuka Setelah Hitungan Mundur
</button>
<button id="btnActive" class="hidden w-full bg-primary text-on-primary text-sm md:font-label-md py-3 md:py-4 px-4 rounded-lg flex items-center justify-center gap-2 shadow-lg hover:bg-primary-container transition-all active:scale-95 pulse-glow cursor-pointer" onclick="window.location.href='login.html'">
<span class="material-symbols-outlined">login</span> Masuk ke Portal Kelulusan
</button>
</div>
</div>
</main>

<footer class="bg-surface-container-lowest border-t border-outline-variant w-full bottom-0 z-50">
<div class="w-full py-3 md:py-stack-md px-3 flex flex-col md:flex-row justify-between items-center gap-2 max-w-container-max mx-auto">
<div id="footerCopyright" class="text-secondary text-xs md:font-body-md opacity-90">© 2026 SMP Negeri 1 Sukosari.</div>
<div class="flex gap-3 items-center">
<a id="footerPanduan" class="text-on-surface-variant text-xs hover:underline decoration-secondary" href="#">Panduan</a>
<a id="footerKontak" class="text-on-surface-variant text-xs hover:underline decoration-secondary" href="#">Admin</a>
</div>
</div>
</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBjmifPVIt1rGfIYEJKCuQJrLLtUT1VHb8",
  authDomain: "spasas-kelulusan.firebaseapp.com",
  databaseURL: "https://spasas-kelulusan-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "spasas-kelulusan",
  storageBucket: "spasas-kelulusan.firebasestorage.app",
  messagingSenderId: "330319909788",
  appId: "1:330319909788:web:0ebeac8d293e539c776e59"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let targetTimestamp = null, countdownInterval = null, isAccessOpen = false;
let siteConfig = {};

async function loadConfig() {
  try {
    const snapshot = await db.ref('config').once('value');
    if (snapshot.exists()) siteConfig = snapshot.val();
  } catch(e) {}
  
  if(!siteConfig.tanggal_pengumuman) siteConfig.tanggal_pengumuman = '2026-06-10';
  if(!siteConfig.jam_pengumuman) siteConfig.jam_pengumuman = '00:00';
  if(!siteConfig.tahun_ajaran) siteConfig.tahun_ajaran = '2025/2026';
  if(!siteConfig.tahun_footer) siteConfig.tahun_footer = '2026';
  
  document.getElementById('tahunAjaranDisplay').textContent = 'SMP Negeri 1 Sukosari Tahun Pelajaran ' + siteConfig.tahun_ajaran;
  document.getElementById('footerCopyright').innerHTML = '© ' + siteConfig.tahun_footer + ' SMP Negeri 1 Sukosari.';
  
  // 🔥 LOGO DARI SHEET CONFIG
  if(siteConfig.logo_url) {
    document.getElementById('logoMain').src = siteConfig.logo_url;
    document.getElementById('logoMain').classList.remove('hidden');
    document.getElementById('logoFallback').classList.add('hidden');
    document.getElementById('logoNav').innerHTML = `<img src="${siteConfig.logo_url}" class="w-6 h-6 md:w-8 md:h-8 object-cover rounded-full" alt="Logo">`;
  }
  
  if(siteConfig.link_panduan) {
    document.getElementById('navPanduan').href = siteConfig.link_panduan;
    document.getElementById('footerPanduan').href = siteConfig.link_panduan;
  }
  if(siteConfig.kontak) {
    const wa = 'https://wa.me/' + String(siteConfig.kontak).replace(/\D/g,'');
    document.getElementById('navKontak').href = wa;
    document.getElementById('footerKontak').href = wa;
  }
  
  let tgl = String(siteConfig.tanggal_pengumuman).replace(/T.*/, '').trim();
  let jam = String(siteConfig.jam_pengumuman).replace(/T.*/, '').trim();
  if (!jam.includes(':')) jam = '00:00';
  const parts = jam.split(':');
  jam = parts[0].padStart(2,'0') + ':' + (parts[1]||'00').padStart(2,'0');
  
  targetTimestamp = new Date(tgl + 'T' + jam + ':00+07:00').getTime();
  if(Date.now() >= targetTimestamp && !isAccessOpen) enableLoginButton();
}

function pad(n){return String(n).padStart(2,'0')}

function updateCountdown() {
  if(!targetTimestamp) return;
  const diff = targetTimestamp - Date.now();
  if(diff <= 0) {
    document.getElementById('days').innerText='00';
    document.getElementById('hours').innerText='00';
    document.getElementById('minutes').innerText='00';
    document.getElementById('seconds').innerText='00';
    if(!isAccessOpen) enableLoginButton();
    return;
  }
  document.getElementById('days').innerText = pad(Math.floor(diff/(1000*60*60*24)));
  document.getElementById('hours').innerText = pad(Math.floor((diff%(1000*60*60*24))/(1000*60*60)));
  document.getElementById('minutes').innerText = pad(Math.floor((diff%(1000*60*60))/(1000*60)));
  document.getElementById('seconds').innerText = pad(Math.floor((diff%(1000*60))/1000));
}

function enableLoginButton() {
  isAccessOpen = true;
  if(countdownInterval) clearInterval(countdownInterval);
  document.getElementById('btnLocked').classList.add('hidden');
  document.getElementById('btnActive').classList.remove('hidden');
}

// Admin bypass - klik 3x judul
let clickCount = 0;
document.querySelector('.font-bold.text-primary').addEventListener('click', function() {
  clickCount++;
  if(clickCount >= 3) {
    clickCount = 0;
    const pass = prompt('🔐 Password admin:');
    if(pass && siteConfig.admin_password && pass === siteConfig.admin_password) {
      window.location.href = 'login.html';
    } else if(pass) {
      alert('❌ Password salah!');
    }
  }
  setTimeout(() => { clickCount = 0; }, 2000);
});

async function init() {
  await loadConfig();
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
  setInterval(loadConfig, 300000);
}
init();
</script>
</body></html>
